- name: Configure uvm
  hosts: uvm
  become: true
  pre_tasks:
    - name: Wait for SSH to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_admin: True
    - role: user-access
      user_access_username: user
      user_access_password: 'btcmp16@admin'
      user_access_sudo: true
  tasks:
    - name: Install unzip and download utilities
      ansible.builtin.apt:
        name:
          - unzip
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Add user to desktop and hardware groups
      ansible.builtin.user:
        name: user
        groups: audio,video,netdev,plugdev,cdrom,dialout,scanner,bluetooth
        append: true

    - name: Ensure LightDM config drop-in directory exists
      ansible.builtin.file:
        path: /etc/lightdm/lightdm.conf.d
        state: directory
        mode: "0755"

    - name: Configure LightDM autologin for user
      ansible.builtin.copy:
        dest: /etc/lightdm/lightdm.conf.d/12-autologin.conf
        content: |
          [Seat:*]
          autologin-user=user
          autologin-user-timeout=0
          user-session=xfce
        mode: "0644"

    - name: Ensure openssh-server is installed
      ansible.builtin.apt:
        name: openssh-server
        state: present

    - name: Allow SSH password login for user and LocalAdmin
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/10-btcmp16.conf
        content: |
          PasswordAuthentication yes
          PubkeyAuthentication yes
          AllowUsers ubuntu user LocalAdmin
        mode: "0644"
      notify: Restart sshd

    - name: Ensure sshd is enabled and running
      ansible.builtin.systemd:
        name: ssh
        enabled: true
        state: started

    - name: Ensure LocalAdmin Desktop directory exists
      ansible.builtin.file:
        path: /home/LocalAdmin/Desktop
        state: directory
        owner: LocalAdmin
        group: LocalAdmin
        mode: "0755"

    - name: Download memory dump archive from Dropbox
      ansible.builtin.get_url:
        url: https://www.dropbox.com/scl/fo/4wi8n7fm01yfcbwv4nom5/AIO_qWCQRyjl9-QtLa70wrE?rlkey=4uu6og3vph3rth8lp1ap86f9c&dl=1
        dest: /tmp/memdump.zip
        mode: "0644"
        force: true

    - name: Ensure extraction directory exists
      ansible.builtin.file:
        path: /tmp/memdump
        state: directory
        mode: "0755"

    - name: Extract Dropbox archive
      ansible.builtin.unarchive:
        src: /tmp/memdump.zip
        dest: /tmp/memdump
        remote_src: true

    - name: Locate the .mem file in the extracted archive
      ansible.builtin.find:
        paths: /tmp/memdump
        patterns: "*.mem"
        recurse: true
      register: mem_files

    - name: Fail if no .mem file was found in the archive
      ansible.builtin.fail:
        msg: "No .mem file found in the downloaded Dropbox archive"
      when: mem_files.matched == 0

    - name: Copy .mem file to LocalAdmin Desktop
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "/home/LocalAdmin/Desktop/{{ item.path | basename }}"
        remote_src: true
        owner: LocalAdmin
        group: LocalAdmin
        mode: "0644"
      loop: "{{ mem_files.files }}"

    - name: Remove temporary download artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/memdump.zip
        - /tmp/memdump

    - name: Install python2.7 and git
      ansible.builtin.apt:
        name:
          - python2.7
          - git
        state: present
        update_cache: true

    - name: Download get-pip.py for Python 2.7
      ansible.builtin.get_url:
        url: https://bootstrap.pypa.io/pip/2.7/get-pip.py
        dest: /tmp/get-pip.py
        mode: "0644"

    - name: Install pip for Python 2.7
      ansible.builtin.command:
        cmd: python2.7 /tmp/get-pip.py
        creates: /usr/local/bin/pip2.7

    - name: Clone Volatility repository as LocalAdmin
      become_user: LocalAdmin
      ansible.builtin.git:
        repo: https://github.com/volatilityfoundation/volatility.git
        dest: /home/LocalAdmin/volatility

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
