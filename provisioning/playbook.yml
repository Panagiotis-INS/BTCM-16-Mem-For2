- name: Configure uvm
  hosts: uvm
  gather_facts: false
  become: true
  pre_tasks:
    - name: Wait for SSH to accept connections
      ansible.builtin.wait_for_connection:
        delay: 0
        sleep: 10
        timeout: 900
  roles:
    - role: ansible-role-user-access
      user_access_username: LocalAdmin
      user_access_password: Password123!
      user_access_admin: True
  tasks:
    - name: Install unzip and download utilities
      ansible.builtin.apt:
        name:
          - unzip
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Ensure LocalAdmin Desktop directory exists
      ansible.builtin.file:
        path: /home/LocalAdmin/Desktop
        state: directory
        owner: LocalAdmin
        group: LocalAdmin
        mode: "0755"

    - name: Download memory dump archive from Dropbox
      ansible.builtin.get_url:
        url: https://www.dropbox.com/scl/fo/4wi8n7fm01yfcbwv4nom5/AIO_qWCQRyjl9-QtLa70wrE?rlkey=4uu6og3vph3rth8lp1ap86f9c&dl=1
        dest: /tmp/memdump.zip
        mode: "0644"
        force: true

    - name: Ensure extraction directory exists
      ansible.builtin.file:
        path: /tmp/memdump
        state: directory
        mode: "0755"

    - name: Extract Dropbox archive
      ansible.builtin.unarchive:
        src: /tmp/memdump.zip
        dest: /tmp/memdump
        remote_src: true

    - name: Locate the .mem file in the extracted archive
      ansible.builtin.find:
        paths: /tmp/memdump
        patterns: "*.mem"
        recurse: true
      register: mem_files

    - name: Fail if no .mem file was found in the archive
      ansible.builtin.fail:
        msg: "No .mem file found in the downloaded Dropbox archive"
      when: mem_files.matched == 0

    - name: Copy .mem file to LocalAdmin Desktop
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "/home/LocalAdmin/Desktop/{{ item.path | basename }}"
        remote_src: true
        owner: LocalAdmin
        group: LocalAdmin
        mode: "0644"
      loop: "{{ mem_files.files }}"

    - name: Remove temporary download artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/memdump.zip
        - /tmp/memdump
